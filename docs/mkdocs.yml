  - Getting Started: 00-getting_started.md
  - Lab 1 Building with GitHub Models: 01-lab-1-using_github_models.md
  - Lab 2 Using Azure AI Foundry Agents: 02-lab-2-using_azure_foundry.md
  - Lab 3 Extending Agents with Tools tools: 03-lab-3-using_tools.md
  - Lab 4 Multi-Agent Orchestration: 04-lab-4-multi_agent_orchestration.md
  - Lab 5 Instrucmentation: 04-lab-5-instrumentation.md


  - Introduction: old/index.md
  - Solution Architecture: old/architecture.md
  - Security Considerations: old/security.md
  - Getting Started: old/getting-started.md
  # - Workshop Setup:
  #   - BUILD Attendees: introduction-event.md
  #   - Self-Guided Learners: introduction-self-guided.md
  - Lab 1 Function Calling Power: old/lab-1-function_calling.md
  - Lab 2 Grounding with Documents: old/lab-2-file_search.md
  - Lab 3 Intro to the Code Interpreter: old/lab-3-code_interpreter.md
  - Lab 4 Grounding with Bing Search: old/lab-4-bing_search.md
  - Lab 5 Multilingual Visualizations: old/lab-5-multilingual.md
